<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cafe Management System - Login">
    <title>Café Noir — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="logo-icon">☕</span>
                <h1>Café Noir</h1>
                <p class="subtitle">Management System</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
                </div>
                <button type="submit" id="loginBtn" class="btn btn-primary btn-full">
                    Sign In
                </button>
                <div id="loginError" class="error-message" style="display:none;"></div>
            </form>
            <div class="login-footer">
                <p>Demo Credentials</p>
                <div class="demo-creds">
                    <span class="cred-badge admin">Admin: admin / admin123</span>
                    <span class="cred-badge staff">Staff: staff / staff123</span>
                </div>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
