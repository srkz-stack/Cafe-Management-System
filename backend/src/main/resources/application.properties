server.port=8080
spring.datasource.url=jdbc:sqlite:./data/cafe.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
app.jwt.secret=cafe-management-super-secret-key-that-is-at-least-256-bits-long-for-hs256
app.jwt.expiration-ms=86400000
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=200,expireAfterWrite=30m
logging.level.com.cafe=DEBUG
logging.level.org.springframework.security=INFO
